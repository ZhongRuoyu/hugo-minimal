name: Build Hugo site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout ZhongRuoyu/hugo-minimal-demo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ZhongRuoyu/hugo-minimal-demo
          persist-credentials: false
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository }}
          path: themes/minimal
          persist-credentials: false
      - name: Install Hugo
        run: |
          HUGO_TAG="$(gh api /repos/gohugoio/hugo/releases/latest -q .tag_name)"
          HUGO_VERSION="${HUGO_TAG#v}"
          curl -fsSL -o "$RUNNER_TEMP/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$RUNNER_TEMP/hugo.deb"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build with Hugo
        run: hugo
        env:
          HUGO_ENVIRONMENT: production
