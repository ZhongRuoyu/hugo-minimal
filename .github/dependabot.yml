version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    allow:
      - dependency-type: all
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /
    allow:
      - dependency-type: all
    schedule:
      interval: weekly
      day: sunday
    cooldown:
      default-days: 7
    groups:
      gomod:
        patterns:
          - "*"
